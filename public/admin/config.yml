# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: kelvinl961/mochrondesign
  branch: main
  base_url: https://mochrondesign-cms-auth.itsmochron.workers.dev

# Legacy local images (existing projects). New uploads use R2 below.
media_folder: public/images/projects
public_folder: /images/projects

# Full-resolution uploads via Cloudflare R2 (run ./scripts/setup-r2-media.sh once).
media_libraries:
  cloudflare_r2:
    access_key_id: 1b83910ae94e2a4c11627c3ccf655891
    bucket: mochrondesign-media
    account_id: f8d8a734cfaeac3dec176d8510a16f78
    public_url: https://media.mochrondesign.com
    prefix: projects/

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{location}}"
    fields:
      - { label: Project Title, name: title, widget: string }
      - { label: Location, name: location, widget: string }
      - { label: Property Type, name: propertyType, widget: string, required: false }
      - label: Gallery Tab
        name: projectTab
        widget: select
        default: completed
        options:
          - { label: Completed Project, value: completed }
          - { label: Visualization, value: visualization }
      - { label: Project Cover Image, name: image, widget: image }
      - label: Gallery Images
        name: gallery
        widget: image
        required: false
        multiple: true
      - { label: Design Concept, name: designConcept, widget: string, required: false }
      - { label: Designer, name: designer, widget: string, required: false }
      - { label: Description, name: description, widget: markdown }
